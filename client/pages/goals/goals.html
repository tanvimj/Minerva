<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minerva — Goals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="goals.css" />
</head>
<body>

  <div class="bg-base"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app-shell">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <div class="bm-ring r1"></div>
          <div class="bm-ring r2"></div>
          <div class="bm-dot"></div>
        </div>
        <div class="brand-text">
          <span class="brand-name">Minerva</span>
          <span class="brand-tag">Digital Brain</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="../dashboard/dashboard.html" class="nav-item" data-label="Dashboard">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg></span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="../notes/notes.html" class="nav-item" data-label="Notes">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M4 4h12v10H4V4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="7" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1"/><line x1="7" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1"/></svg></span>
          <span class="nav-label">Notes</span>
        </a>
        <a href="../goals/goals.html" class="nav-item active" data-label="Goals">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1"/><circle cx="10" cy="10" r="1" fill="currentColor"/></svg></span>
          <span class="nav-label">Goals</span>
        </a>
        <a href="../analytics/analytics.html" class="nav-item" data-label="Analytics">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><polyline points="3,15 7,9 11,12 15,5 17,7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="nav-label">Analytics</span>
        </a>
        <a href="../graph/graph.html" class="nav-item" data-label="Graph">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="5" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="16" cy="5" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="4" cy="15" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="16" cy="15" r="1.5" stroke="currentColor" stroke-width="1"/><line x1="5.5" y1="6" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1"/><line x1="14.5" y1="6" x2="11.5" y2="8.5" stroke="currentColor" stroke-width="1"/><line x1="5.5" y1="14" x2="8.5" y2="11.5" stroke="currentColor" stroke-width="1"/><line x1="14.5" y1="14" x2="11.5" y2="11.5" stroke="currentColor" stroke-width="1"/></svg></span>
          <span class="nav-label">Graph</span>
        </a>
        <a href="../timeline/timeline.html" class="nav-item" data-label="Timeline">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><line x1="10" y1="2" x2="10" y2="18" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="5" r="2" stroke="currentColor" stroke-width="1"/><circle cx="10" cy="10" r="2" fill="currentColor" opacity=".4"/><circle cx="10" cy="15" r="2" stroke="currentColor" stroke-width="1"/><line x1="10" y1="5" x2="15" y2="5" stroke="currentColor" stroke-width="1"/><line x1="10" y1="10" x2="5" y2="10" stroke="currentColor" stroke-width="1"/><line x1="10" y1="15" x2="15" y2="15" stroke="currentColor" stroke-width="1"/></svg></span>
          <span class="nav-label">Timeline</span>
        </a>
        <div class="nav-divider"></div>
        <a href="../settings/settings.html" class="nav-item" data-label="Settings">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <button class="sidebar-toggle" id="sidebarToggle">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </aside>

    <!-- ══ MAIN WRAP ══ -->
    <div class="main-wrap">

      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">Goals</h1>
        </div>
        <div class="topbar-right">
          <div class="search-pill">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <input type="text" placeholder="Search goals…" class="search-input" id="searchInput" />
          </div>
          <button class="icon-btn" aria-label="Notifications">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a6 6 0 016 6c0 3 1 4 2 5H2c1-1 2-2 2-5a6 6 0 016-6z" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 17a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3"/></svg>
            <span class="notif-dot"></span>
          </button>
          <button class="avatar-btn" aria-label="Profile">
            <span class="avatar-initials" id="avatarInitials">M</span>
          </button>
        </div>
      </header>

      <main class="content" id="content">

        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header-left">
            <p class="page-eyebrow">Personal Growth</p>
            <h2 class="page-heading">Your <em>Goals</em></h2>
            <p class="page-sub">Track what matters. Measure what moves.</p>
          </div>
          <button class="new-goal-btn" id="newGoalBtn">
            <svg viewBox="0 0 16 16" fill="none"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            New Goal
          </button>
        </div>

        <!-- Overview -->
        <div class="overview-strip" id="overviewStrip">
          <div class="ov-card" data-delay="0">
            <div class="ov-label">Total Goals</div>
            <div class="ov-value"><span id="ovTotal">0</span></div>
            <div class="ov-sub" id="ovTotalSub">across all categories</div>
          </div>
          <div class="ov-card" data-delay="80">
            <div class="ov-label">In Progress</div>
            <div class="ov-value"><span id="ovActive">0</span></div>
            <div class="ov-sub up" id="ovActiveSub">currently active</div>
          </div>
          <div class="ov-card" data-delay="160">
            <div class="ov-label">Completed</div>
            <div class="ov-value"><span id="ovDone">0</span></div>
            <div class="ov-sub" id="ovDoneSub">goals achieved</div>
          </div>
          <div class="ov-card" data-delay="240">
            <div class="ov-label">Avg. Progress</div>
            <div class="ov-value"><span id="ovAvg">0</span><span style="-webkit-text-fill-color:var(--accent);font-size:1.2rem">%</span></div>
            <div class="ov-sub" id="ovAvgSub">across active goals</div>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar" id="filterBar">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="active">Active</button>
          <button class="filter-chip" data-filter="completed">Completed</button>
          <button class="filter-chip" data-filter="paused">Paused</button>
          <div class="filter-sep"></div>
          <button class="filter-chip" data-filter="work">Work</button>
          <button class="filter-chip" data-filter="health">Health</button>
          <button class="filter-chip" data-filter="learning">Learning</button>
          <button class="filter-chip" data-filter="personal">Personal</button>
          <button class="filter-chip" data-filter="finance">Finance</button>
          <select class="sort-select" id="sortSelect">
            <option value="updated">Recently updated</option>
            <option value="progress">By progress</option>
            <option value="due">By due date</option>
            <option value="name">By name</option>
          </select>
        </div>

        <!-- Goals Grid -->
        <div class="goals-grid" id="goalsGrid">
          <!-- Injected by JS -->
        </div>

      </main>
    </div>
  </div>

  <!-- ══ NEW GOAL MODAL ══ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Goal</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Goal name</label>
        <input type="text" class="form-input" id="goalName" placeholder="What do you want to achieve?" />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="goalDesc" placeholder="Why does this matter to you?"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="goalCategory">
            <option value="work">Work</option>
            <option value="health">Health</option>
            <option value="learning">Learning</option>
            <option value="personal">Personal</option>
            <option value="finance">Finance</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="goalStatus">
            <option value="active">Active</option>
            <option value="paused">Paused</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Progress (%)</label>
          <input type="number" class="form-input" id="goalProgress" placeholder="0" min="0" max="100" value="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Due date</label>
          <input type="date" class="form-input" id="goalDue" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Milestones</label>
        <div class="milestone-list" id="milestoneList"></div>
        <div class="add-milestone">
          <input type="text" id="milestoneInput" placeholder="Add a milestone…" />
          <button class="add-milestone-btn" id="addMilestoneBtn">+</button>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-save" id="btnSave">Save Goal</button>
      </div>
    </div>
  </div>
  <script src="goals.js"></script>
</body>
</html>
