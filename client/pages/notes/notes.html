<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minerva — Notes</title>
  <link rel="stylesheet" href="notes.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ░░ BACKGROUND ░░ -->
  <div class="bg-base"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <!-- ░░ APP SHELL ░░ -->
  <div class="app-shell">

    <!-- ══════════════════════════════
         SIDEBAR
    ══════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <div class="bm-ring r1"></div>
          <div class="bm-ring r2"></div>
          <div class="bm-dot"></div>
        </div>
        <div class="brand-text">
          <span class="brand-name">Minerva</span>
          <span class="brand-tag">Digital Brain</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="../dashboard/dashboard.html" class="nav-item" data-label="Dashboard">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg></span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="../notes/notes.html" class="nav-item active" data-label="Notes">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M4 4h12v10H4V4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="7" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1"/><line x1="7" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1"/></svg></span>
          <span class="nav-label">Notes</span>
        </a>
        <a href="../goals/goals.html" class="nav-item" data-label="Goals">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1"/><circle cx="10" cy="10" r="1" fill="currentColor"/></svg></span>
          <span class="nav-label">Goals</span>
        </a>
        <a href="../analytics/analytics.html" class="nav-item" data-label="Analytics">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><polyline points="3,15 7,9 11,12 15,5 17,7" stroke("currentColor", stroke-width("1.3", stroke-linecap("round", stroke-linejoin("round"/></svg></span>
          <span class="nav-label">Analytics</span>
        </a>
        <a href="../graph/graph.html" class="nav-item" data-label="Graph">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="5" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="16" cy="5" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="4" cy="15" r="1.5" stroke="currentColor" stroke-width="1"/><circle cx="16" cy="15" r="1.5" stroke="currentColor" stroke-width="1"/><line x1="5.5" y1="6" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1"/><line x1="14.5" y1="6" x2="11.5" y2="8.5" stroke="currentColor" stroke-width="1"/><line x1="5.5" y1="14" x2="8.5" y2="11.5" stroke="currentColor" stroke-width="1"/><line x1="14.5" y1="14" x2="11.5" y2="11.5" stroke="currentColor" stroke-width="1"/></svg></span>
          <span class="nav-label">Graph</span>
        </a>
        <a href="../timeline/timeline.html" class="nav-item" data-label="Timeline">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><line x1="10" y1="2" x2="10" y2="18" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="5" r="2" stroke="currentColor" stroke-width="1"/><circle cx="10" cy="10" r="2" fill="currentColor" opacity=".4"/><circle cx="10" cy="15" r="2" stroke="currentColor" stroke-width="1"/><line x1="10" y1="5" x2="15" y2="5" stroke="currentColor" stroke-width="1"/><line x1="10" y1="10" x2="5" y2="10" stroke="currentColor" stroke-width="1"/><line x1="10" y1="15" x2="15" y2="15" stroke="currentColor" stroke-width="1"/></svg></span>
          <span class="nav-label">Timeline</span>
        </a>
        <div class="nav-divider"></div>
        <a href="../settings/settings.html" class="nav-item" data-label="Settings">
          <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Collapse sidebar">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </aside>

    <!-- ══════════════════════════════
         MAIN WRAP
    ══════════════════════════════ -->
    <div class="main-wrap">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <!-- Mobile panel toggle -->
          <button class="panel-toggle-btn" id="panelToggleBtn" aria-label="Toggle panel">
            <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="5" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <h1 class="page-title">Notes</h1>
          <span class="note-count-badge" id="noteCountBadge">0 notes</span>
        </div>
        <div class="topbar-right">
          <div class="search-pill">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <input type="text" placeholder="Search…" class="search-input" id="topSearch" />
          </div>
          <button class="icon-btn" aria-label="Notifications">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a6 6 0 016 6c0 3 1 4 2 5H2c1-1 2-2 2-5a6 6 0 016-6z" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 17a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3"/></svg>
            <span class="notif-dot"></span>
          </button>
          <button class="avatar-btn" aria-label="Profile">
            <span class="avatar-initials">TM</span>
          </button>
        </div>
      </header>

      <!-- NOTES WORKSPACE -->
      <div class="workspace" id="workspace">

        <!-- ── LEFT: Notes list panel ── -->
        <div class="list-panel" id="listPanel">

          <div class="list-header">
            <!-- Search -->
            <div class="list-search">
              <svg viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              <input type="text" id="listSearch" placeholder="Search notes…" autocomplete="off" />
            </div>

            <!-- Filters -->
            <div class="list-filters" id="listFilters">
              <button class="filter-chip active" data-filter="all">All</button>
              <button class="filter-chip" data-filter="idea">Ideas</button>
              <button class="filter-chip" data-filter="research">Research</button>
              <button class="filter-chip" data-filter="project">Projects</button>
            </div>

            <!-- New note -->
            <button class="new-note-btn" id="newNoteBtn">
              <svg viewBox="0 0 16 16" fill="none"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span>New Note</span>
            </button>
          </div>

          <!-- Notes list -->
          <div class="notes-list" id="notesList">
            <!-- Injected by JS -->
          </div>

          <!-- Empty state -->
          <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">
              <svg viewBox="0 0 48 48" fill="none"><rect x="8" y="6" width="32" height="36" rx="3" stroke="currentColor" stroke-width="1.4"/><line x1="16" y1="16" x2="32" y2="16" stroke="currentColor" stroke-width="1.2"/><line x1="16" y1="22" x2="28" y2="22" stroke="currentColor" stroke-width="1.2"/><line x1="16" y1="28" x2="24" y2="28" stroke="currentColor" stroke-width="1.2"/></svg>
            </div>
            <p class="empty-title">No notes found</p>
            <p class="empty-sub">Try a different search or create a new note</p>
          </div>

        </div>

        <!-- ── RIGHT: Editor panel ── -->
        <div class="editor-panel" id="editorPanel">

          <!-- Editor toolbar -->
          <div class="editor-toolbar" id="editorToolbar">
            <div class="toolbar-left">
              <span class="unsaved-indicator" id="unsavedIndicator" style="opacity:0">
                <span class="unsaved-dot"></span>
                Unsaved changes
              </span>
            </div>
            <div class="toolbar-right">
              <span class="word-count" id="wordCount">0 words</span>
              <span class="char-count" id="charCount">0 chars</span>
              <button class="toolbar-btn" id="deleteNoteBtn" title="Delete note" style="display:none">
                <svg viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4v8h6V4H5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button class="save-btn" id="saveBtn">
                <svg viewBox="0 0 16 16" fill="none"><path d="M3 3h8l2 2v8H3V3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><rect x="5" y="9" width="6" height="4" rx=".5" stroke="currentColor" stroke-width="1"/><rect x="5" y="3" width="4" height="3" rx=".5" stroke="currentColor" stroke-width="1"/></svg>
                <span id="saveBtnLabel">Save</span>
              </button>
            </div>
          </div>

          <!-- Editor body -->
          <div class="editor-body" id="editorBody">

            <!-- Title -->
            <input
              type="text"
              class="note-title-input"
              id="noteTitleInput"
              placeholder="Note title…"
              autocomplete="off"
              spellcheck="false"
            />

            <!-- Tag row -->
            <div class="tag-row" id="tagRow">
              <div class="tags-list" id="tagsList">
                <!-- Tag pills injected here -->
              </div>
              <div class="tag-add-wrap" id="tagAddWrap">
                <input type="text" class="tag-input" id="tagInput" placeholder="Add tag…" maxlength="20" />
              </div>
            </div>

            <!-- Divider -->
            <div class="editor-divider"></div>

            <!-- Content -->
            <div
              class="note-content"
              id="noteContent"
              contenteditable="true"
              spellcheck="false"
              data-placeholder="Begin writing…"
            ></div>

          </div>

          <!-- Empty editor state -->
          <div class="editor-empty" id="editorEmpty">
            <div class="editor-empty-inner">
              <div class="ee-icon">
                <svg viewBox="0 0 56 56" fill="none"><rect x="10" y="8" width="36" height="40" rx="3" stroke="currentColor" stroke-width="1.3"/><line x1="18" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="1.2"/><line x1="18" y1="27" x2="34" y2="27" stroke="currentColor" stroke-width="1.2"/><line x1="18" y1="34" x2="28" y2="34" stroke="currentColor" stroke-width="1.2"/></svg>
              </div>
              <h2 class="ee-title">Your thoughts, organised.</h2>
              <p class="ee-sub">Select a note to read and edit, or create a new one to begin.</p>
              <button class="ee-btn" id="eeNewBtn">
                <svg viewBox="0 0 16 16" fill="none"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                New Note
              </button>
            </div>
          </div>

        </div>
      </div><!-- /workspace -->
    </div><!-- /main-wrap -->
  </div><!-- /app-shell -->

  <script src="notes.js"></script>
</body>
</html>
